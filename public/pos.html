<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POS – La Gran Empresa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0f;
      --surface:  #111118;
      --surface2: #1a1a24;
      --border:   rgba(255,255,255,0.07);
      --border2:  rgba(255,255,255,0.12);
      --gold:     #d4a843;
      --gold2:    #f0c060;
      --red:      #e05555;
      --green:    #4caf7d;
      --text:     #f0ede8;
      --muted:    #6b6880;
      --muted2:   #9896a4;
      --radius:   16px;
      --radius-sm:10px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }

    #root { height: 100vh; display: flex; }

    /* ── Sidebar ── */
    .sidebar {
      width: 72px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 0;
      gap: 8px;
      flex-shrink: 0;
      z-index: 10;
    }
    .logo-mark {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--gold), #b8860b);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 15px; color: #0a0a0f;
      margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(212,168,67,0.3);
    }
    .nav-btn {
      width: 44px; height: 44px;
      background: transparent; border: none; cursor: pointer;
      border-radius: 12px; color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; position: relative;
    }
    .nav-btn:hover { background: var(--surface2); color: var(--text); }
    .nav-btn.active { background: rgba(212,168,67,0.15); color: var(--gold); }
    .nav-btn .badge {
      position: absolute; top: 6px; right: 6px;
      width: 8px; height: 8px; background: var(--red);
      border-radius: 50%; border: 2px solid var(--surface);
    }
    .nav-divider { width: 32px; height: 1px; background: var(--border); margin: 8px 0; }
    .back-btn { margin-top: auto; }

    /* ── Layout ── */
    .main { flex: 1; display: flex; overflow: hidden; }
    .panel { flex: 1; overflow-y: auto; padding: 28px; display: flex; flex-direction: column; gap: 20px; }
    .panel::-webkit-scrollbar { width: 4px; }
    .panel::-webkit-scrollbar-track { background: transparent; }
    .panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    /* ── Cart Panel ── */
    .cart-panel {
      width: 360px; flex-shrink: 0;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .page-header { display: flex; align-items: center; justify-content: space-between; }
    .page-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .page-sub { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }

    /* ── Search ── */
    .search-wrap { position: relative; }
    .search-input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 16px 12px 44px;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
      outline: none; transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--gold); }
    .search-input::placeholder { color: var(--muted); }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }

    /* ── Categories ── */
    .cats { display: flex; gap: 8px; flex-wrap: wrap; }
    .cat-btn {
      padding: 6px 14px; border-radius: 100px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted2); font-size: 12px; font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: all 0.18s; white-space: nowrap;
    }
    .cat-btn:hover { border-color: var(--border2); color: var(--text); }
    .cat-btn.active { background: var(--gold); border-color: var(--gold); color: #0a0a0f; font-weight: 600; }

    /* ── Product Grid ── */
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .product-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
      cursor: pointer; transition: all 0.2s; text-align: left;
      position: relative; overflow: hidden;
    }
    .product-card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(212,168,67,0.04), transparent);
      opacity: 0; transition: opacity 0.2s;
    }
    .product-card:hover { border-color: rgba(212,168,67,0.3); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .product-card:hover::before { opacity: 1; }
    .product-card:active { transform: translateY(0); }
    .product-card.out-of-stock { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

    .prod-emoji { font-size: 24px; margin-bottom: 10px; display: block; }
    .prod-name { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.3; margin-bottom: 6px; }
    .prod-price { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; color: var(--gold); }
    .prod-stock { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: 'DM Mono', monospace; }
    .prod-stock.low { color: var(--red); }
    .prod-cat-badge {
      display: inline-block; font-size: 10px; padding: 2px 8px;
      background: rgba(255,255,255,0.05); border-radius: 100px;
      color: var(--muted2); margin-bottom: 8px;
    }

    /* ── Cart ── */
    .cart-header {
      padding: 24px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .cart-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; }
    .cart-count { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }
    .cart-items { flex: 1; overflow-y: auto; padding: 12px; }
    .cart-items::-webkit-scrollbar { width: 3px; }
    .cart-items::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    .cart-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 200px; color: var(--muted); gap: 8px; }
    .cart-empty span { font-size: 36px; }
    .cart-empty p { font-size: 13px; }

    .cart-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px; border-radius: var(--radius-sm);
      transition: background 0.15s; margin-bottom: 4px;
    }
    .cart-item:hover { background: var(--surface2); }
    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cart-item-price { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
    .qty-ctrl { display: flex; align-items: center; gap: 6px; }
    .qty-btn {
      width: 26px; height: 26px; border-radius: 8px;
      border: 1px solid var(--border2); background: transparent;
      color: var(--text); cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .qty-btn:hover { background: var(--surface2); border-color: var(--gold); color: var(--gold); }
    .qty-btn.del:hover { border-color: var(--red); color: var(--red); }
    .qty-num { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; width: 20px; text-align: center; }
    .cart-item-total { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--gold); min-width: 56px; text-align: right; }

    /* ── Totals ── */
    .cart-footer { padding: 16px 20px 20px; border-top: 1px solid var(--border); }
    .total-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted2); margin-bottom: 6px; font-family: 'DM Mono', monospace; }
    .total-row.grand { font-size: 20px; color: var(--text); font-weight: 500; margin: 12px 0 16px; border-top: 1px solid var(--border); padding-top: 12px; }
    .total-row.grand .val { color: var(--gold); }
    .total-row.cambio { color: var(--green); margin-top: 8px; }

    .monto-input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 14px;
      color: var(--text); font-family: 'DM Mono', monospace; font-size: 15px;
      outline: none; margin-bottom: 10px; transition: border-color 0.2s;
    }
    .monto-input:focus { border-color: var(--gold); }
    .monto-input::placeholder { color: var(--muted); font-size: 13px; }

    .btn-checkout {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--gold), #b8860b);
      border: none; border-radius: var(--radius-sm);
      color: #0a0a0f; font-family: 'Syne', sans-serif;
      font-size: 15px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(212,168,67,0.25);
      letter-spacing: 0.3px;
    }
    .btn-checkout:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(212,168,67,0.4); }
    .btn-checkout:active { transform: translateY(0); }
    .btn-checkout:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-clear { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--muted2); font-size: 12px; padding: 6px 12px; cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
    .btn-clear:hover { border-color: var(--red); color: var(--red); }

    /* ── Stats cards ── */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; }
    .stat-label { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .stat-value { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 700; }
    .stat-value.gold { color: var(--gold); }
    .stat-value.red { color: var(--red); }
    .stat-value.green { color: var(--green); }

    /* ── Table ── */
    .data-table { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .table-head { display: grid; padding: 12px 20px; border-bottom: 1px solid var(--border); }
    .table-head span { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.5px; }
    .table-row { display: grid; padding: 14px 20px; border-bottom: 1px solid var(--border); align-items: center; transition: background 0.15s; }
    .table-row:last-child { border-bottom: none; }
    .table-row:hover { background: rgba(255,255,255,0.02); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px); z-index: 100;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 20px; padding: 28px; max-width: 420px; width: 100%;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
      animation: modalIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes modalIn { from { opacity:0; transform:scale(0.9) translateY(10px); } to { opacity:1; transform:scale(1) translateY(0); } }
    .modal-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .modal-sub { font-size: 12px; color: var(--muted); margin-bottom: 20px; }

    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-family: 'DM Mono', monospace; }
    .form-input, .form-select {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 14px;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
      outline: none; transition: border-color 0.2s;
    }
    .form-input:focus, .form-select:focus { border-color: var(--gold); }
    .form-select option { background: var(--surface); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold), #b8860b);
      border: none; border-radius: var(--radius-sm); padding: 11px 20px;
      color: #0a0a0f; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px;
      cursor: pointer; transition: all 0.2s; flex: 1;
    }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: var(--radius-sm); padding: 11px 20px;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-secondary:hover { border-color: var(--border2); background: rgba(255,255,255,0.05); }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }

    /* ── Ticket ── */
    .ticket { text-align: center; }
    .ticket-icon { font-size: 48px; margin-bottom: 12px; }
    .ticket-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .ticket-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
    .ticket-items { text-align: left; background: var(--surface2); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 14px; }
    .ticket-item { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; color: var(--muted2); }
    .ticket-item span:last-child { font-family: 'DM Mono', monospace; }
    .ticket-totals { text-align: left; padding: 0 4px; }
    .ticket-row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; font-family: 'DM Mono', monospace; }
    .ticket-row.total { font-size: 16px; font-weight: 600; color: var(--gold); border-top: 1px solid var(--border); margin-top: 6px; padding-top: 8px; }
    .ticket-row.cambio-row { color: var(--green); }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 200;
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: var(--radius-sm); padding: 12px 18px;
      font-size: 13px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      animation: toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
      display: flex; align-items: center; gap: 10px;
    }
    .toast.ok { border-left: 3px solid var(--green); }
    .toast.err { border-left: 3px solid var(--red); }
    @keyframes toastIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    /* ── Loading ── */
    .loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: var(--muted); gap: 10px; font-size: 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 18px; height: 18px; border: 2px solid var(--border2); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }

    /* ── Quick amounts ── */
    .quick-amts { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
    .quick-btn {
      padding: 8px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--muted2); font-family: 'DM Mono', monospace;
      font-size: 12px; cursor: pointer; transition: all 0.15s;
    }
    .quick-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(212,168,67,0.05); }

    /* ── Scrollbar ── */
    .panel::-webkit-scrollbar-track { background: transparent; }

    /* Responsive */
    @media (max-width: 900px) {
      .cart-panel { width: 300px; }
      .products-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const API = '/api';
const fmt = n => `$${parseFloat(n||0).toFixed(2)}`;

const EMOJIS = { 'Lácteos':'🥛','Abarrotes':'🛒','Bebidas':'🥤','Panadería':'🍞','Embutidos':'🥩','Limpieza':'🧹','Carnes':'🥩','Frutas y Verduras':'🥦','General':'📦' };
const getEmoji = cat => EMOJIS[cat] || '📦';

const CATS_DEFAULT = ['Lácteos','Abarrotes','Bebidas','Panadería','Embutidos','Limpieza','Carnes','Frutas y Verduras','General'];

// SVG Icons
const Icon = ({ d, size=18, stroke=2 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round">
    <path d={d}/>
  </svg>
);

const Icons = {
  cart: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>,
  search: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>,
  box: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>,
  chart: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>,
  back: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
  plus: () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  minus: () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  trash: () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>,
  edit: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
  x: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
};

function App() {
  const [vista, setVista] = useState('venta');
  const [productos, setProductos] = useState([]);
  const [ventas, setVentas] = useState([]);
  const [loading, setLoading] = useState(true);
  const [carrito, setCarrito] = useState([]);
  const [busqueda, setBusqueda] = useState('');
  const [catFiltro, setCatFiltro] = useState('Todos');
  const [montoRecibido, setMontoRecibido] = useState('');
  const [ticket, setTicket] = useState(null);
  const [adminModal, setAdminModal] = useState(false);
  const [editProd, setEditProd] = useState(null);
  const [form, setForm] = useState({ nombre:'', precio:'', stock:'', categoria:'General', codigo:'' });
  const [toast, setToast] = useState(null);
  const [procesando, setProcesando] = useState(false);
  const [guardando, setGuardando] = useState(false);

  const showToast = (msg, tipo='ok') => {
    setToast({ msg, tipo });
    setTimeout(() => setToast(null), 2800);
  };

  const fetchProductos = async () => {
    try {
      const r = await fetch(`${API}/productos`);
      const d = await r.json();
      setProductos(Array.isArray(d) ? d : []);
    } catch { showToast('Error cargando productos', 'err'); }
    finally { setLoading(false); }
  };

  const fetchVentas = async () => {
    try {
      const r = await fetch(`${API}/ventas`);
      const d = await r.json();
      setVentas(Array.isArray(d) ? d : []);
    } catch {}
  };

  useEffect(() => { fetchProductos(); fetchVentas(); }, []);

  const categorias = ['Todos', ...new Set(productos.map(p => p.categoria || 'General'))];

  const productosFiltrados = productos.filter(p => {
    const q = busqueda.toLowerCase();
    const m = p.nombre.toLowerCase().includes(q) || (p.codigo||'').toLowerCase().includes(q);
    const c = catFiltro === 'Todos' || (p.categoria||'General') === catFiltro;
    return m && c;
  });

  const addToCart = (prod) => {
    if (prod.stock <= 0) return;
    setCarrito(prev => {
      const ex = prev.find(i => i.id === prod.id);
      if (ex) {
        if (ex.cantidad >= prod.stock) return prev;
        return prev.map(i => i.id === prod.id ? { ...i, cantidad: i.cantidad + 1 } : i);
      }
      return [...prev, { ...prod, cantidad: 1 }];
    });
  };

  const modQty = (id, delta) => {
    setCarrito(prev => {
      const item = prev.find(i => i.id === id);
      const nueva = item.cantidad + delta;
      if (nueva <= 0) return prev.filter(i => i.id !== id);
      if (nueva > item.stock) return prev;
      return prev.map(i => i.id === id ? { ...i, cantidad: nueva } : i);
    });
  };

  const subtotal = carrito.reduce((s, i) => s + i.precio * i.cantidad, 0);
  const iva = subtotal * 0.16;
  const total = subtotal + iva;
  const cambio = (parseFloat(montoRecibido) || 0) - total;

  const quickAmounts = [50, 100, 200, 500, 1000].filter(a => a >= total - 0.01).slice(0, 6);

  const checkout = async () => {
    if (!carrito.length) return;
    const recibido = parseFloat(montoRecibido) || 0;
    if (!montoRecibido) { showToast('Ingresa el monto recibido', 'err'); return; }
    if (recibido < total) { showToast('Monto insuficiente', 'err'); return; }
    setProcesando(true);
    try {
      const r = await fetch(`${API}/ventas`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          subtotal, iva, total, monto_recibido: recibido, cambio: recibido - total,
          items: carrito.map(i => ({ id: i.id, nombre: i.nombre, precio: i.precio, cantidad: i.cantidad }))
        })
      });
      if (!r.ok) throw new Error();
      setTicket({ items: [...carrito], subtotal, iva, total, montoRecibido: recibido, cambio: recibido - total });
      setCarrito([]);
      setMontoRecibido('');
      await fetchProductos();
      await fetchVentas();
      showToast('Venta registrada exitosamente');
    } catch { showToast('Error al procesar la venta', 'err'); }
    finally { setProcesando(false); }
  };

  const openAdmin = (prod = null) => {
    setEditProd(prod);
    setForm(prod ? { nombre: prod.nombre, precio: prod.precio, stock: prod.stock, categoria: prod.categoria || 'General', codigo: prod.codigo || '' }
                 : { nombre:'', precio:'', stock:'', categoria:'General', codigo:'' });
    setAdminModal(true);
  };

  const saveProduct = async () => {
    if (!form.nombre || !form.precio || form.stock === '') { showToast('Completa los campos requeridos', 'err'); return; }
    setGuardando(true);
    const body = { nombre: form.nombre, precio: parseFloat(form.precio), stock: parseInt(form.stock), categoria: form.categoria, codigo: form.codigo, unidad_medida_id: null };
    try {
      if (editProd) {
        await fetch(`${API}/productos/${editProd.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        showToast('Producto actualizado');
      } else {
        await fetch(`${API}/productos`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        showToast('Producto creado');
      }
      setAdminModal(false);
      await fetchProductos();
    } catch { showToast('Error al guardar', 'err'); }
    finally { setGuardando(false); }
  };

  const deleteProd = async (id) => {
    if (!confirm('¿Eliminar este producto?')) return;
    await fetch(`${API}/productos/${id}`, { method: 'DELETE' });
    showToast('Producto eliminado');
    await fetchProductos();
  };

  const adjustStock = async (id, delta) => {
    const p = productos.find(x => x.id === id);
    const ns = Math.max(0, (p.stock || 0) + delta);
    await fetch(`${API}/productos/${id}/stock`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ stock: ns }) });
    await fetchProductos();
  };

  const stockBajo = productos.filter(p => (p.stock || 0) < 10);
  const totalVentas = ventas.reduce((s, v) => s + parseFloat(v.total || 0), 0);
  const today = ventas.filter(v => new Date(v.created_at).toDateString() === new Date().toDateString());

  return (
    <div style={{ display:'flex', height:'100vh' }}>
      {/* Sidebar */}
      <div className="sidebar">
        <div className="logo-mark">GE</div>
        {[
          { id: 'venta', Icon: Icons.cart, label: 'Venta' },
          { id: 'inventario', Icon: Icons.box, label: 'Inventario', badge: stockBajo.length > 0 },
          { id: 'reportes', Icon: Icons.chart, label: 'Reportes' },
        ].map(({ id, Icon, badge }) => (
          <button key={id} className={`nav-btn${vista===id?' active':''}`} onClick={() => setVista(id)} title={id.charAt(0).toUpperCase()+id.slice(1)}>
            <Icon />
            {badge && <div className="badge" />}
          </button>
        ))}
        <div className="nav-divider" />
        <a href="/" className="nav-btn back-btn" title="Volver al Almacén"><Icons.back /></a>
      </div>

      {/* Main */}
      <div className="main">

        {/* ── VENTA ── */}
        {vista === 'venta' && (
          <>
            <div className="panel">
              <div className="page-header">
                <div>
                  <div className="page-title">Punto de Venta</div>
                  <div className="page-sub">La Gran Empresa · {new Date().toLocaleDateString('es-MX', { weekday:'long', day:'numeric', month:'long' })}</div>
                </div>
                <button className="btn-secondary" style={{ fontSize:13, padding:'8px 16px' }} onClick={() => openAdmin()}>+ Nuevo Producto</button>
              </div>

              {/* Search */}
              <div className="search-wrap">
                <span className="search-icon"><Icons.search /></span>
                <input className="search-input" placeholder="Buscar por nombre o código..." value={busqueda} onChange={e => setBusqueda(e.target.value)} />
              </div>

              {/* Categories */}
              <div className="cats">
                {categorias.map(c => (
                  <button key={c} className={`cat-btn${catFiltro===c?' active':''}`} onClick={() => setCatFiltro(c)}>{c}</button>
                ))}
              </div>

              {/* Products */}
              {loading ? (
                <div className="loading"><div className="spinner" /> Cargando productos...</div>
              ) : (
                <div className="products-grid">
                  {productosFiltrados.map(p => (
                    <button key={p.id} className={`product-card${p.stock<=0?' out-of-stock':''}`} onClick={() => addToCart(p)}>
                      <span className="prod-emoji">{getEmoji(p.categoria)}</span>
                      <div className="prod-cat-badge">{p.categoria || 'General'}</div>
                      <div className="prod-name">{p.nombre}</div>
                      <div className="prod-price">{fmt(p.precio)}</div>
                      <div className={`prod-stock${(p.stock||0)<10?' low':''}`}>{p.stock<=0 ? 'Sin stock' : `${p.stock} uds`}</div>
                    </button>
                  ))}
                  {productosFiltrados.length === 0 && !loading && (
                    <div style={{ gridColumn:'1/-1', textAlign:'center', padding:'60px 20px', color:'var(--muted)' }}>
                      <div style={{ fontSize:36, marginBottom:8 }}>🔍</div>
                      <div style={{ fontSize:14 }}>Sin resultados para "{busqueda}"</div>
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* Cart */}
            <div className="cart-panel">
              <div className="cart-header">
                <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                  <div>
                    <div className="cart-title">Carrito</div>
                    <div className="cart-count">{carrito.length} {carrito.length===1?'producto':'productos'}</div>
                  </div>
                  {carrito.length > 0 && <button className="btn-clear" onClick={() => setCarrito([])}>Limpiar</button>}
                </div>
              </div>

              <div className="cart-items">
                {carrito.length === 0 ? (
                  <div className="cart-empty">
                    <span>🛒</span>
                    <p>Selecciona productos</p>
                  </div>
                ) : carrito.map(item => (
                  <div key={item.id} className="cart-item">
                    <div className="cart-item-info">
                      <div className="cart-item-name">{item.nombre}</div>
                      <div className="cart-item-price">{fmt(item.precio)} × {item.cantidad}</div>
                    </div>
                    <div className="qty-ctrl">
                      <button className="qty-btn del" onClick={() => modQty(item.id, -1)}>{item.cantidad === 1 ? <Icons.trash /> : <Icons.minus />}</button>
                      <span className="qty-num">{item.cantidad}</span>
                      <button className="qty-btn" onClick={() => modQty(item.id, 1)}><Icons.plus /></button>
                    </div>
                    <div className="cart-item-total">{fmt(item.precio * item.cantidad)}</div>
                  </div>
                ))}
              </div>

              {carrito.length > 0 && (
                <div className="cart-footer">
                  <div className="total-row"><span>Subtotal</span><span className="val">{fmt(subtotal)}</span></div>
                  <div className="total-row"><span>IVA 16%</span><span className="val">{fmt(iva)}</span></div>
                  <div className="total-row grand"><span>Total</span><span className="val">{fmt(total)}</span></div>

                  {quickAmounts.length > 0 && (
                    <div className="quick-amts">
                      {quickAmounts.map(a => (
                        <button key={a} className="quick-btn" onClick={() => setMontoRecibido(String(a))}>${a}</button>
                      ))}
                    </div>
                  )}

                  <input className="monto-input" type="number" placeholder="Monto recibido ($)" value={montoRecibido} onChange={e => setMontoRecibido(e.target.value)} />
                  {montoRecibido && parseFloat(montoRecibido) >= total && (
                    <div className="total-row cambio"><span>Cambio</span><span>{fmt(cambio)}</span></div>
                  )}
                  <button className="btn-checkout" onClick={checkout} disabled={procesando || !montoRecibido}>
                    {procesando ? '⏳ Procesando...' : '✓ Finalizar Venta'}
                  </button>
                </div>
              )}
            </div>
          </>
        )}

        {/* ── INVENTARIO ── */}
        {vista === 'inventario' && (
          <div className="panel">
            <div className="page-header">
              <div>
                <div className="page-title">Inventario</div>
                <div className="page-sub">{productos.length} productos registrados</div>
              </div>
              <button className="btn-primary" style={{ padding:'10px 20px', borderRadius:'var(--radius-sm)' }} onClick={() => openAdmin()}>+ Agregar</button>
            </div>

            <div className="stats-row">
              <div className="stat-card"><div className="stat-label">Total</div><div className="stat-value">{productos.length}</div></div>
              <div className="stat-card"><div className="stat-label">Stock Bajo</div><div className="stat-value red">{stockBajo.length}</div></div>
              <div className="stat-card"><div className="stat-label">Categorías</div><div className="stat-value gold">{categorias.length - 1}</div></div>
              <div className="stat-card"><div className="stat-label">Total Unidades</div><div className="stat-value green">{productos.reduce((s,p) => s+(p.stock||0), 0)}</div></div>
            </div>

            <div className="data-table">
              <div className="table-head" style={{ gridTemplateColumns:'2fr 1fr 1fr 100px 120px' }}>
                <span>Producto</span><span>Categoría</span><span>Precio</span><span>Stock</span><span>Acciones</span>
              </div>
              {productos.length === 0 ? (
                <div className="loading">Sin productos. Agrega uno.</div>
              ) : productos.map(p => (
                <div key={p.id} className="table-row" style={{ gridTemplateColumns:'2fr 1fr 1fr 100px 120px' }}>
                  <div>
                    <div style={{ fontSize:14, fontWeight:500 }}>{p.nombre}</div>
                    {p.codigo && <div style={{ fontSize:11, color:'var(--muted)', fontFamily:'DM Mono' }}>{p.codigo}</div>}
                  </div>
                  <div style={{ fontSize:13, color:'var(--muted2)' }}>{p.categoria || 'General'}</div>
                  <div style={{ fontFamily:'DM Mono', fontSize:13, color:'var(--gold)' }}>{fmt(p.precio)}</div>
                  <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                    <button className="qty-btn" style={{ width:22, height:22, fontSize:11 }} onClick={() => adjustStock(p.id, -10)}>-10</button>
                    <span style={{ fontFamily:'DM Mono', fontSize:13, width:28, textAlign:'center', color:(p.stock||0)<10?'var(--red)':'var(--text)' }}>{p.stock}</span>
                    <button className="qty-btn" style={{ width:22, height:22, fontSize:11 }} onClick={() => adjustStock(p.id, 10)}>+10</button>
                  </div>
                  <div style={{ display:'flex', gap:6, justifyContent:'flex-end' }}>
                    <button className="qty-btn" onClick={() => openAdmin(p)}><Icons.edit /></button>
                    <button className="qty-btn del" onClick={() => deleteProd(p.id)}><Icons.trash /></button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ── REPORTES ── */}
        {vista === 'reportes' && (
          <div className="panel">
            <div className="page-header">
              <div>
                <div className="page-title">Reportes</div>
                <div className="page-sub">Historial de ventas</div>
              </div>
            </div>

            <div className="stats-row">
              <div className="stat-card"><div className="stat-label">Ventas Hoy</div><div className="stat-value gold">{today.length}</div></div>
              <div className="stat-card"><div className="stat-label">Total Hoy</div><div className="stat-value green">{fmt(today.reduce((s,v)=>s+parseFloat(v.total||0),0))}</div></div>
              <div className="stat-card"><div className="stat-label">Total Historial</div><div className="stat-value">{ventas.length}</div></div>
              <div className="stat-card"><div className="stat-label">Recaudado Total</div><div className="stat-value gold">{fmt(totalVentas)}</div></div>
            </div>

            <div className="data-table">
              <div className="table-head" style={{ gridTemplateColumns:'60px 2fr 1fr 1fr 1fr' }}>
                <span>#</span><span>Fecha</span><span>Subtotal</span><span>IVA</span><span>Total</span>
              </div>
              {ventas.length === 0 ? (
                <div className="loading">Sin ventas registradas aún.</div>
              ) : ventas.map(v => (
                <div key={v.id} className="table-row" style={{ gridTemplateColumns:'60px 2fr 1fr 1fr 1fr' }}>
                  <div style={{ fontFamily:'DM Mono', fontSize:12, color:'var(--muted)' }}>#{v.id}</div>
                  <div style={{ fontSize:13 }}>{new Date(v.created_at).toLocaleString('es-MX')}</div>
                  <div style={{ fontFamily:'DM Mono', fontSize:13, color:'var(--muted2)' }}>{fmt(v.subtotal)}</div>
                  <div style={{ fontFamily:'DM Mono', fontSize:13, color:'var(--muted2)' }}>{fmt(v.iva)}</div>
                  <div style={{ fontFamily:'DM Mono', fontSize:14, fontWeight:600, color:'var(--gold)' }}>{fmt(v.total)}</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* ── TICKET MODAL ── */}
      {ticket && (
        <div className="modal-overlay">
          <div className="modal ticket">
            <div className="ticket-icon">✅</div>
            <div className="ticket-title">¡Venta Completada!</div>
            <div className="ticket-sub">{new Date().toLocaleString('es-MX')}</div>
            <div className="ticket-items">
              {ticket.items.map(i => (
                <div key={i.id} className="ticket-item">
                  <span>{i.nombre} ×{i.cantidad}</span>
                  <span>{fmt(i.precio * i.cantidad)}</span>
                </div>
              ))}
            </div>
            <div className="ticket-totals">
              <div className="ticket-row"><span>Subtotal</span><span>{fmt(ticket.subtotal)}</span></div>
              <div className="ticket-row"><span>IVA 16%</span><span>{fmt(ticket.iva)}</span></div>
              <div className="ticket-row total"><span>Total</span><span>{fmt(ticket.total)}</span></div>
              <div className="ticket-row" style={{ padding:'6px 0', color:'var(--muted2)' }}><span>Recibido</span><span>{fmt(ticket.montoRecibido)}</span></div>
              <div className="ticket-row cambio-row"><span>Cambio</span><span>{fmt(ticket.cambio)}</span></div>
            </div>
            <div className="modal-actions" style={{ marginTop:20 }}>
              <button className="btn-primary" style={{ flex:1 }} onClick={() => setTicket(null)}>Nueva Venta</button>
            </div>
          </div>
        </div>
      )}

      {/* ── ADMIN MODAL ── */}
      {adminModal && (
        <div className="modal-overlay" onClick={e => e.target===e.currentTarget && setAdminModal(false)}>
          <div className="modal">
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:4 }}>
              <div className="modal-title">{editProd ? 'Editar Producto' : 'Nuevo Producto'}</div>
              <button className="nav-btn" style={{ width:30, height:30 }} onClick={() => setAdminModal(false)}><Icons.x /></button>
            </div>
            <div className="modal-sub">{editProd ? 'Modifica los datos del producto' : 'Agrega un nuevo producto al inventario'}</div>

            <div className="form-group">
              <label className="form-label">Nombre *</label>
              <input className="form-input" value={form.nombre} onChange={e => setForm({...form, nombre:e.target.value})} placeholder="Nombre del producto" />
            </div>
            <div className="form-row">
              <div className="form-group">
                <label className="form-label">Precio *</label>
                <input className="form-input" type="number" step="0.01" value={form.precio} onChange={e => setForm({...form, precio:e.target.value})} placeholder="0.00" />
              </div>
              <div className="form-group">
                <label className="form-label">Stock *</label>
                <input className="form-input" type="number" value={form.stock} onChange={e => setForm({...form, stock:e.target.value})} placeholder="0" />
              </div>
            </div>
            <div className="form-row">
              <div className="form-group">
                <label className="form-label">Código</label>
                <input className="form-input" value={form.codigo} onChange={e => setForm({...form, codigo:e.target.value})} placeholder="Ej: ABA001" />
              </div>
              <div className="form-group">
                <label className="form-label">Categoría</label>
                <select className="form-select" value={form.categoria} onChange={e => setForm({...form, categoria:e.target.value})}>
                  {CATS_DEFAULT.map(c => <option key={c} value={c}>{c}</option>)}
                </select>
              </div>
            </div>
            <div className="modal-actions">
              <button className="btn-secondary" onClick={() => setAdminModal(false)}>Cancelar</button>
              <button className="btn-primary" onClick={saveProduct} disabled={guardando}>
                {guardando ? 'Guardando...' : (editProd ? 'Guardar Cambios' : 'Crear Producto')}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── TOAST ── */}
      {toast && (
        <div className={`toast ${toast.tipo}`}>
          <span>{toast.tipo==='ok' ? '✓' : '✗'}</span>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
