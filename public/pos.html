<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Punto de Venta – La Gran Empresa</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    @keyframes slideIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes ripple { 0% { transform:scale(0); opacity:0.5; } 100% { transform:scale(4); opacity:0; } }
    .animate-slideIn { animation: slideIn 0.3s ease forwards; }
    .ripple-effect { position:absolute; border-radius:50%; background:rgba(0,0,0,0.15); width:60px; height:60px; margin-top:-30px; margin-left:-30px; animation:ripple 0.6s linear; pointer-events:none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const API = "/api";

// Iconos desde lucide
const icons = {
  ShoppingCart: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>,
  Search: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>,
  Trash2: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>,
  Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  Minus: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  X: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  Edit: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
  Save: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>,
  BarChart3: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>,
  Home: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
  Package: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>,
  ArrowLeft: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
};

const fmt = n => `$${parseFloat(n||0).toFixed(2)}`;

function PuntoDeVenta() {
  const [productos, setProductos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [carrito, setCarrito] = useState([]);
  const [busqueda, setBusqueda] = useState('');
  const [categoriaFiltro, setCategoriaFiltro] = useState('Todos');
  const [ventasHoy, setVentasHoy] = useState([]);
  const [mostrarTicket, setMostrarTicket] = useState(false);
  const [ultimaVenta, setUltimaVenta] = useState(null);
  const [mostrarProductos, setMostrarProductos] = useState(false);
  const [montoRecibido, setMontoRecibido] = useState('');
  const [mostrarAdmin, setMostrarAdmin] = useState(false);
  const [productoEditando, setProductoEditando] = useState(null);
  const [formProducto, setFormProducto] = useState({ nombre:'', precio:'', categoria:'General', stock:'', codigo:'' });
  const [vistaActual, setVistaActual] = useState('venta');
  const [guardando, setGuardando] = useState(false);
  const [toast, setToast] = useState(null);

  const showToast = (msg, tipo='ok') => {
    setToast({ msg, tipo });
    setTimeout(() => setToast(null), 2500);
  };

  const fetchProductos = async () => {
    try {
      const r = await fetch(`${API}/productos`);
      const data = await r.json();
      setProductos(data.reverse());
    } catch(e) { showToast('Error cargando productos', 'err'); }
    finally { setLoading(false); }
  };

  const fetchVentas = async () => {
    try {
      const r = await fetch(`${API}/ventas`);
      const data = await r.json();
      setVentasHoy(data);
    } catch(e) {}
  };

  useEffect(() => {
    fetchProductos();
    fetchVentas();
  }, []);

  const categorias = ['Todos', ...new Set(productos.map(p => p.categoria || 'General'))];

  const productosFiltrados = productos.filter(p => {
    const q = busqueda.toLowerCase();
    const matchQ = p.nombre.toLowerCase().includes(q) || (p.codigo||'').toLowerCase().includes(q);
    const matchC = categoriaFiltro === 'Todos' || (p.categoria||'General') === categoriaFiltro;
    return matchQ && matchC;
  });

  const agregarAlCarrito = (producto) => {
    const existente = carrito.find(i => i.id === producto.id);
    if (existente) {
      if (existente.cantidad < producto.stock) {
        setCarrito(carrito.map(i => i.id === producto.id ? {...i, cantidad: i.cantidad+1} : i));
      }
    } else {
      setCarrito([...carrito, {...producto, cantidad:1}]);
    }
  };

  const modificarCantidad = (id, cambio) => {
    const item = carrito.find(i => i.id === id);
    const nueva = item.cantidad + cambio;
    if (nueva === 0) setCarrito(carrito.filter(i => i.id !== id));
    else if (nueva <= item.stock) setCarrito(carrito.map(i => i.id === id ? {...i, cantidad:nueva} : i));
  };

  const subtotal = () => carrito.reduce((t, i) => t + i.precio * i.cantidad, 0);
  const iva = () => subtotal() * 0.16;
  const total = () => subtotal() + iva();
  const cambio = () => (parseFloat(montoRecibido)||0) - total();

  const finalizarVenta = async () => {
    if (!carrito.length) return;
    const recibido = parseFloat(montoRecibido) || 0;
    if (recibido < total()) { showToast('Monto insuficiente', 'err'); return; }
    setGuardando(true);
    try {
      const r = await fetch(`${API}/ventas`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          subtotal: subtotal(), iva: iva(), total: total(),
          monto_recibido: recibido, cambio: recibido - total(),
          items: carrito.map(i => ({ id:i.id, nombre:i.nombre, precio:i.precio, cantidad:i.cantidad }))
        })
      });
      const venta = await r.json();
      setUltimaVenta({ ...venta, items: carrito, subtotal:subtotal(), iva:iva(), total:total(), montoRecibido:recibido, cambio:recibido-total() });
      setMostrarTicket(true);
      setCarrito([]);
      setMontoRecibido('');
      await fetchProductos();
      await fetchVentas();
      showToast('Venta registrada ✓');
    } catch(e) { showToast('Error al registrar venta', 'err'); }
    finally { setGuardando(false); }
  };

  const guardarProducto = async () => {
    if (!formProducto.nombre || !formProducto.precio || !formProducto.stock) {
      showToast('Completa nombre, precio y stock', 'err'); return;
    }
    setGuardando(true);
    const body = {
      nombre: formProducto.nombre,
      precio: parseFloat(formProducto.precio),
      stock: parseInt(formProducto.stock),
      categoria: formProducto.categoria,
      codigo: formProducto.codigo,
      unidad_medida_id: null
    };
    try {
      if (productoEditando) {
        await fetch(`${API}/productos/${productoEditando.id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
        showToast('Producto actualizado ✓');
      } else {
        await fetch(`${API}/productos`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
        showToast('Producto creado ✓');
      }
      await fetchProductos();
      setProductoEditando(null);
      setFormProducto({ nombre:'', precio:'', categoria:'General', stock:'', codigo:'' });
    } catch(e) { showToast('Error al guardar', 'err'); }
    finally { setGuardando(false); }
  };

  const eliminarProducto = async (id) => {
    if (!window.confirm('¿Eliminar este producto?')) return;
    await fetch(`${API}/productos/${id}`, { method:'DELETE' });
    await fetchProductos();
    showToast('Eliminado');
  };

  const ajustarStock = async (id, cantidad) => {
    const prod = productos.find(p => p.id === id);
    const nuevoStock = Math.max(0, (prod.stock||0) + cantidad);
    await fetch(`${API}/productos/${id}/stock`, {
      method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ stock: nuevoStock })
    });
    await fetchProductos();
  };

  const productosStockBajo = productos.filter(p => (p.stock||0) < 10);
  const reporte = { totalVentas: ventasHoy.reduce((s,v)=>s+parseFloat(v.total||0),0), numeroVentas: ventasHoy.length };

  return (
    <div className="min-h-screen bg-white relative">
      {/* Toast */}
      {toast && (
        <div className={`fixed top-4 right-4 z-50 px-4 py-3 rounded-xl text-white text-sm shadow-lg ${toast.tipo==='err' ? 'bg-red-500' : 'bg-green-600'}`}>
          {toast.msg}
        </div>
      )}

      {/* Sidebar */}
      <div className="hidden md:flex fixed left-0 top-0 h-full z-30">
        <div className="group flex flex-col w-16 hover:w-56 transition-all duration-300 ease-in-out bg-gradient-to-b from-gray-950 via-gray-900 to-gray-950 border-r border-gray-800 overflow-hidden">
          <div className="p-4 border-b border-gray-800 flex items-center gap-3">
            <div className="w-8 h-8 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center flex-shrink-0">
              <span className="text-white text-xs font-bold">PV</span>
            </div>
            <span className="whitespace-nowrap opacity-0 group-hover:opacity-100 transition-all duration-300 text-white font-semibold text-sm">La Gran Empresa</span>
          </div>
          <nav className="p-3 space-y-2 flex-1">
            {[
              { id:'venta', label:'Punto de Venta', Icon: icons.Home },
              { id:'inventario', label:'Inventario', Icon: icons.Package },
              { id:'reportes', label:'Reportes', Icon: icons.BarChart3 },
            ].map(({ id, label, Icon }) => (
              <button key={id} onClick={() => setVistaActual(id)}
                className={`w-full flex items-center gap-3 px-3 py-3 rounded-xl transition-all ${vistaActual===id ? 'bg-gradient-to-r from-blue-600 to-purple-600 text-white shadow-lg' : 'text-gray-400 hover:bg-white/10 hover:text-white'}`}>
                <Icon />
                <span className="whitespace-nowrap opacity-0 group-hover:opacity-100 transition-all duration-300 text-sm font-medium">{label}</span>
                {id==='inventario' && productosStockBajo.length > 0 && <span className="ml-auto opacity-0 group-hover:opacity-100 bg-red-500 text-white text-xs px-1.5 py-0.5 rounded-full">{productosStockBajo.length}</span>}
              </button>
            ))}
            <div className="pt-2 border-t border-gray-800">
              <a href="/" className="w-full flex items-center gap-3 px-3 py-3 rounded-xl text-gray-400 hover:bg-white/10 hover:text-white transition-all">
                <icons.ArrowLeft />
                <span className="whitespace-nowrap opacity-0 group-hover:opacity-100 transition-all duration-300 text-sm">← Almacén</span>
              </a>
            </div>
          </nav>
          <div className="p-4 border-t border-gray-800 opacity-0 group-hover:opacity-100 transition-all duration-300">
            <div className="bg-white/5 rounded-xl p-3 text-xs text-gray-400 space-y-1">
              <div className="flex justify-between"><span>Ventas hoy</span><span className="text-white font-bold">{ventasHoy.length}</span></div>
              <div className="flex justify-between"><span>Total</span><span className="text-green-400 font-bold">{fmt(reporte.totalVentas)}</span></div>
            </div>
          </div>
        </div>
      </div>

      {/* Main */}
      <div className="md:pl-16 px-4 pt-6 pb-24 md:pb-6 max-w-7xl mx-auto">
        {/* Header */}
        <div className="mb-6 pb-4 border-b border-gray-200 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 bg-black rounded-full flex items-center justify-center text-white">
              {vistaActual==='venta' && <icons.ShoppingCart />}
              {vistaActual==='inventario' && <icons.Package />}
              {vistaActual==='reportes' && <icons.BarChart3 />}
            </div>
            <div>
              <h1 className="text-xl font-light text-gray-900">
                {vistaActual==='venta' && 'Punto de Venta'}
                {vistaActual==='inventario' && 'Inventario'}
                {vistaActual==='reportes' && 'Reportes'}
              </h1>
              <p className="text-xs text-gray-400">La Gran Empresa</p>
            </div>
          </div>
          <div className="flex items-center gap-3">
            <div className="text-right">
              <p className="text-xs text-gray-400">Ventas hoy</p>
              <p className="text-2xl font-light">{ventasHoy.length}</p>
            </div>
            <button onClick={() => setMostrarAdmin(true)} className="px-4 py-2 bg-gray-900 text-white text-sm rounded-xl hover:bg-gray-800 transition-all">Admin</button>
          </div>
        </div>

        {/* ── VISTA VENTA ── */}
        {vistaActual==='venta' && (
          <div className={`grid grid-cols-1 ${mostrarProductos ? 'lg:grid-cols-3' : ''} gap-6`}>
            {mostrarProductos && (
              <div className="lg:col-span-2 space-y-4">
                <div className="bg-white border border-gray-200 rounded-2xl p-4">
                  <div className="flex gap-3 mb-4">
                    <div className="flex-1 relative">
                      <span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"><icons.Search /></span>
                      <input type="text" placeholder="Buscar producto o código..." value={busqueda} onChange={e=>setBusqueda(e.target.value)}
                        className="w-full pl-12 pr-4 py-3 bg-gray-50 border-0 rounded-xl focus:ring-2 focus:ring-black text-sm" />
                    </div>
                    <button onClick={() => { setMostrarProductos(false); setBusqueda(''); }} className="w-10 h-10 flex items-center justify-center rounded-full bg-white border border-gray-300 hover:bg-gray-100">
                      <icons.X />
                    </button>
                  </div>
                  <div className="flex gap-2 overflow-x-auto pb-1">
                    {categorias.map(cat => (
                      <button key={cat} onClick={() => setCategoriaFiltro(cat)}
                        className={`px-4 py-2 rounded-full text-xs font-medium whitespace-nowrap transition-all ${categoriaFiltro===cat ? 'bg-black text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                        {cat}
                      </button>
                    ))}
                  </div>
                </div>
                {loading ? (
                  <div className="text-center py-12 text-gray-400">Cargando productos...</div>
                ) : (
                  <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
                    {productosFiltrados.map(producto => (
                      <button key={producto.id} onClick={() => agregarAlCarrito(producto)}
                        disabled={producto.stock <= 0}
                        className={`p-4 rounded-2xl border-2 text-left transition-all active:scale-95 ${producto.stock<=0 ? 'border-gray-100 bg-gray-50 opacity-50 cursor-not-allowed' : 'border-gray-200 bg-white hover:border-gray-400 hover:shadow-md'}`}>
                        <div className="w-8 h-8 bg-gray-100 rounded-xl flex items-center justify-center mb-3 text-lg">
                          {(producto.categoria||'G')[0]}
                        </div>
                        <p className="text-sm font-medium text-gray-900 mb-1 line-clamp-2">{producto.nombre}</p>
                        <p className="text-lg font-bold text-gray-900">{fmt(producto.precio)}</p>
                        <p className={`text-xs mt-1 ${producto.stock<10 ? 'text-red-500' : 'text-gray-400'}`}>Stock: {producto.stock}</p>
                      </button>
                    ))}
                    {productosFiltrados.length===0 && <p className="col-span-4 text-center py-8 text-gray-400">Sin resultados</p>}
                  </div>
                )}
              </div>
            )}

            {/* Carrito */}
            <div className={`${mostrarProductos ? '' : 'max-w-lg mx-auto w-full'} space-y-4`}>
              {!mostrarProductos && (
                <button onClick={() => setMostrarProductos(true)}
                  className="w-full py-4 bg-black text-white rounded-2xl font-medium hover:bg-gray-800 transition-all flex items-center justify-center gap-2">
                  <icons.Search /> Buscar Producto
                </button>
              )}
              <div className="bg-white border border-gray-200 rounded-2xl overflow-hidden">
                <div className="p-4 border-b border-gray-100 flex items-center justify-between">
                  <h2 className="font-medium text-gray-900 flex items-center gap-2"><icons.ShoppingCart /> Carrito ({carrito.length})</h2>
                  {carrito.length>0 && <button onClick={() => setCarrito([])} className="text-xs text-red-500 hover:text-red-700">Limpiar</button>}
                </div>
                <div className="max-h-64 overflow-y-auto">
                  {carrito.length===0 ? (
                    <p className="text-center py-8 text-gray-400 text-sm">Agrega productos al carrito</p>
                  ) : carrito.map(item => (
                    <div key={item.id} className="p-3 border-b border-gray-50 flex items-center gap-3">
                      <div className="flex-1 min-w-0">
                        <p className="text-sm font-medium text-gray-900 truncate">{item.nombre}</p>
                        <p className="text-xs text-gray-500">{fmt(item.precio)} c/u</p>
                      </div>
                      <div className="flex items-center gap-2">
                        <button onClick={() => modificarCantidad(item.id,-1)} className="w-7 h-7 bg-gray-100 rounded-lg flex items-center justify-center hover:bg-gray-200"><icons.Minus /></button>
                        <span className="w-6 text-center text-sm font-medium">{item.cantidad}</span>
                        <button onClick={() => modificarCantidad(item.id,1)} className="w-7 h-7 bg-gray-100 rounded-lg flex items-center justify-center hover:bg-gray-200"><icons.Plus /></button>
                        <button onClick={() => setCarrito(carrito.filter(i=>i.id!==item.id))} className="w-7 h-7 bg-red-50 text-red-500 rounded-lg flex items-center justify-center hover:bg-red-100"><icons.Trash2 /></button>
                      </div>
                      <span className="text-sm font-bold w-16 text-right">{fmt(item.precio*item.cantidad)}</span>
                    </div>
                  ))}
                </div>
              </div>

              {carrito.length>0 && (
                <div className="bg-gray-950 text-white rounded-2xl p-5 space-y-3">
                  <div className="flex justify-between text-sm text-gray-400"><span>Subtotal</span><span>{fmt(subtotal())}</span></div>
                  <div className="flex justify-between text-sm text-gray-400"><span>IVA (16%)</span><span>{fmt(iva())}</span></div>
                  <div className="flex justify-between text-lg font-bold border-t border-gray-800 pt-3"><span>Total</span><span>{fmt(total())}</span></div>
                  <div className="relative">
                    <span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm">$</span>
                    <input type="number" placeholder="Monto recibido" value={montoRecibido}
                      onChange={e => setMontoRecibido(e.target.value)}
                      className="w-full pl-8 pr-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-gray-500 focus:ring-2 focus:ring-white/30 text-sm" />
                  </div>
                  {montoRecibido && parseFloat(montoRecibido) >= total() && (
                    <div className="flex justify-between text-green-400 text-sm"><span>Cambio</span><span>{fmt(cambio())}</span></div>
                  )}
                  <button onClick={finalizarVenta} disabled={guardando}
                    className="w-full py-4 bg-white text-gray-900 font-bold rounded-xl hover:bg-gray-100 transition-all active:scale-95 disabled:opacity-50">
                    {guardando ? 'Procesando...' : 'Finalizar Venta'}
                  </button>
                </div>
              )}
            </div>
          </div>
        )}

        {/* ── VISTA INVENTARIO ── */}
        {vistaActual==='inventario' && (
          <div className="space-y-4">
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
              <div className="bg-gray-50 rounded-2xl p-4"><p className="text-xs text-gray-400">Total Productos</p><p className="text-2xl font-light">{productos.length}</p></div>
              <div className="bg-red-50 rounded-2xl p-4"><p className="text-xs text-red-400">Stock Bajo</p><p className="text-2xl font-light text-red-600">{productosStockBajo.length}</p></div>
              <div className="bg-gray-50 rounded-2xl p-4"><p className="text-xs text-gray-400">Categorías</p><p className="text-2xl font-light">{categorias.length-1}</p></div>
              <div className="bg-gray-50 rounded-2xl p-4"><p className="text-xs text-gray-400">Total Stock</p><p className="text-2xl font-light">{productos.reduce((s,p)=>s+(p.stock||0),0)}</p></div>
            </div>
            <div className="bg-white border border-gray-200 rounded-2xl overflow-hidden">
              <div className="p-4 border-b border-gray-100"><h3 className="font-medium">Productos ({productos.length})</h3></div>
              <div className="max-h-96 overflow-y-auto divide-y divide-gray-50">
                {productos.map(p => (
                  <div key={p.id} className="p-4 flex items-center gap-3">
                    <div className="flex-1 min-w-0">
                      <p className="font-medium text-gray-900">{p.nombre}</p>
                      <p className="text-xs text-gray-400">{p.categoria} {p.codigo ? `· ${p.codigo}` : ''} · {fmt(p.precio)}</p>
                    </div>
                    <div className="flex items-center gap-2">
                      <button onClick={() => ajustarStock(p.id,-10)} className="px-2 py-1 bg-red-100 text-red-600 rounded-lg text-xs hover:bg-red-200">-10</button>
                      <button onClick={() => ajustarStock(p.id,10)} className="px-2 py-1 bg-green-100 text-green-600 rounded-lg text-xs hover:bg-green-200">+10</button>
                      <span className={`w-16 text-right text-sm font-medium ${(p.stock||0)<10 ? 'text-red-600' : 'text-gray-700'}`}>{p.stock} uds</span>
                      <button onClick={() => { setProductoEditando(p); setFormProducto({ nombre:p.nombre, precio:p.precio, categoria:p.categoria||'General', stock:p.stock, codigo:p.codigo||'' }); setMostrarAdmin(true); }}
                        className="w-8 h-8 bg-blue-50 text-blue-600 rounded-lg flex items-center justify-center hover:bg-blue-100"><icons.Edit /></button>
                      <button onClick={() => eliminarProducto(p.id)} className="w-8 h-8 bg-red-50 text-red-500 rounded-lg flex items-center justify-center hover:bg-red-100"><icons.Trash2 /></button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* ── VISTA REPORTES ── */}
        {vistaActual==='reportes' && (
          <div className="space-y-4">
            <div className="grid grid-cols-2 sm:grid-cols-3 gap-4">
              <div className="bg-gray-50 rounded-2xl p-5"><p className="text-xs text-gray-400 mb-1">Ventas Hoy</p><p className="text-3xl font-light">{reporte.numeroVentas}</p></div>
              <div className="bg-green-50 rounded-2xl p-5"><p className="text-xs text-green-500 mb-1">Total Recaudado</p><p className="text-3xl font-light text-green-700">{fmt(reporte.totalVentas)}</p></div>
              <div className="bg-gray-50 rounded-2xl p-5"><p className="text-xs text-gray-400 mb-1">Ticket Promedio</p><p className="text-3xl font-light">{fmt(reporte.numeroVentas>0 ? reporte.totalVentas/reporte.numeroVentas : 0)}</p></div>
            </div>
            <div className="bg-white border border-gray-200 rounded-2xl overflow-hidden">
              <div className="p-4 border-b border-gray-100"><h3 className="font-medium">Historial de Ventas</h3></div>
              <div className="max-h-96 overflow-y-auto divide-y divide-gray-50">
                {ventasHoy.length===0 ? <p className="text-center py-8 text-gray-400">Sin ventas registradas</p> :
                  ventasHoy.map(v => (
                    <div key={v.id} className="p-4 flex items-center justify-between">
                      <div>
                        <p className="text-sm font-medium">Venta #{v.id}</p>
                        <p className="text-xs text-gray-400">{new Date(v.created_at).toLocaleString('es-MX')}</p>
                      </div>
                      <span className="font-bold text-gray-900">{fmt(v.total)}</span>
                    </div>
                  ))
                }
              </div>
            </div>
          </div>
        )}
      </div>

      {/* Modal Ticket */}
      {mostrarTicket && ultimaVenta && (
        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-3xl max-w-sm w-full p-6 shadow-2xl">
            <div className="text-center mb-6">
              <div className="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-3">
                <span className="text-3xl">✓</span>
              </div>
              <h2 className="text-xl font-medium">Venta Completada</h2>
            </div>
            <div className="space-y-2 text-sm mb-6">
              {ultimaVenta.items.map(i => (
                <div key={i.id} className="flex justify-between text-gray-600">
                  <span>{i.nombre} x{i.cantidad}</span><span>{fmt(i.precio*i.cantidad)}</span>
                </div>
              ))}
              <div className="border-t pt-2 space-y-1">
                <div className="flex justify-between text-gray-500"><span>Subtotal</span><span>{fmt(ultimaVenta.subtotal)}</span></div>
                <div className="flex justify-between text-gray-500"><span>IVA</span><span>{fmt(ultimaVenta.iva)}</span></div>
                <div className="flex justify-between font-bold text-lg"><span>Total</span><span>{fmt(ultimaVenta.total)}</span></div>
                <div className="flex justify-between text-green-600"><span>Cambio</span><span>{fmt(ultimaVenta.cambio)}</span></div>
              </div>
            </div>
            <button onClick={() => setMostrarTicket(false)} className="w-full py-3 bg-black text-white rounded-xl font-medium hover:bg-gray-800 transition-all">
              Nueva Venta
            </button>
          </div>
        </div>
      )}

      {/* Modal Admin */}
      {mostrarAdmin && (
        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-3xl max-w-md w-full p-6 shadow-2xl max-h-[90vh] overflow-y-auto">
            <div className="flex justify-between items-center mb-5">
              <h2 className="text-lg font-medium">{productoEditando ? 'Editar Producto' : 'Nuevo Producto'}</h2>
              <button onClick={() => { setMostrarAdmin(false); setProductoEditando(null); setFormProducto({ nombre:'', precio:'', categoria:'General', stock:'', codigo:'' }); }} className="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center hover:bg-gray-200"><icons.X /></button>
            </div>
            <div className="space-y-4">
              {[
                { label:'Nombre *', key:'nombre', type:'text', placeholder:'Nombre del producto' },
                { label:'Código', key:'codigo', type:'text', placeholder:'Ej: ABA001' },
                { label:'Precio *', key:'precio', type:'number', placeholder:'0.00' },
                { label:'Stock *', key:'stock', type:'number', placeholder:'0' },
              ].map(f => (
                <div key={f.key}>
                  <label className="block text-xs text-gray-500 mb-1 uppercase tracking-wide">{f.label}</label>
                  <input type={f.type} value={formProducto[f.key]} placeholder={f.placeholder}
                    onChange={e => setFormProducto({...formProducto, [f.key]: e.target.value})}
                    className="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-black text-sm" />
                </div>
              ))}
              <div>
                <label className="block text-xs text-gray-500 mb-1 uppercase tracking-wide">Categoría</label>
                <select value={formProducto.categoria} onChange={e => setFormProducto({...formProducto, categoria: e.target.value})}
                  className="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-black text-sm">
                  {['General','Lácteos','Abarrotes','Bebidas','Panadería','Embutidos','Limpieza','Carnes','Frutas y Verduras'].map(c => (
                    <option key={c} value={c}>{c}</option>
                  ))}
                </select>
              </div>
              <div className="flex gap-3 pt-2">
                <button onClick={guardarProducto} disabled={guardando}
                  className="flex-1 bg-black text-white py-3 rounded-xl font-medium hover:bg-gray-800 transition-all disabled:opacity-50 flex items-center justify-center gap-2">
                  <icons.Save /> {guardando ? 'Guardando...' : (productoEditando ? 'Guardar Cambios' : 'Crear Producto')}
                </button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Bottom nav móvil */}
      <div className="md:hidden fixed bottom-0 left-0 right-0 bg-gray-950 border-t border-gray-800 z-40">
        <div className="grid grid-cols-4 gap-1 p-2">
          {[
            { id:'venta', label:'Venta', Icon: icons.Home },
            { id:'inventario', label:'Inventario', Icon: icons.Package },
            { id:'reportes', label:'Reportes', Icon: icons.BarChart3 },
          ].map(({ id, label, Icon }) => (
            <button key={id} onClick={() => setVistaActual(id)}
              className={`flex flex-col items-center gap-1 py-2 rounded-xl transition-all ${vistaActual===id ? 'bg-white/10 text-white' : 'text-gray-400'}`}>
              <Icon />
              <span className="text-xs">{label}</span>
            </button>
          ))}
          <a href="/" className="flex flex-col items-center gap-1 py-2 rounded-xl text-gray-400 hover:text-white transition-all">
            <icons.ArrowLeft />
            <span className="text-xs">Almacén</span>
          </a>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PuntoDeVenta />);
</script>
</body>
</html>
